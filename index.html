<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theo dõi điểm bài</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background:#0f172a; }
  .card { background:#1e293b; border:1px solid #334155; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  .chevron { transition: transform .2s; }
  .collapsed .chevron { transform: rotate(-90deg); }
  .collapsed .panel { display:none; }
</style>
</head>
<body class="text-slate-100 min-h-screen pb-10">
<div class="max-w-md mx-auto px-3 pt-4 space-y-3">

  <h1 class="text-xl font-bold text-center text-amber-400 mb-1">🃏 Theo dõi điểm bài</h1>

  <!-- Players setup -->
  <div class="card rounded-xl p-3" id="setupSection">
    <div class="flex justify-between items-center cursor-pointer" onclick="toggleCollapse('setupSection')">
      <h2 class="font-semibold">Người chơi</h2>
      <span class="chevron">▾</span>
    </div>
    <div class="panel mt-2 space-y-2">
      <div id="playerInputs" class="space-y-2"></div>
      <button onclick="addPlayerInput()" class="w-full bg-slate-700 hover:bg-slate-600 rounded-lg py-2 text-sm">+ Thêm người chơi</button>
      <button onclick="startGame()" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-semibold rounded-lg py-2 text-sm">Bắt đầu / Cập nhật danh sách</button>
    </div>
  </div>

  <!-- New round -->
  <div class="card rounded-xl p-3" id="roundSection">
    <div class="flex justify-between items-center cursor-pointer" onclick="toggleCollapse('roundSection')">
      <h2 class="font-semibold">Vòng mới <span id="roundNum" class="text-amber-400"></span></h2>
      <span class="chevron">▾</span>
    </div>
    <div class="panel mt-2 space-y-2">
      <p class="text-xs text-slate-400">Nhập số lá còn lại (người tới ghi 0)</p>
      <div id="roundInputs" class="space-y-2"></div>
      <button onclick="submitRound()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-semibold rounded-lg py-2 text-sm">Lưu vòng này</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="card rounded-xl p-3" id="dashSection">
    <div class="flex justify-between items-center cursor-pointer" onclick="toggleCollapse('dashSection')">
      <h2 class="font-semibold">Dashboard</h2>
      <span class="chevron">▾</span>
    </div>
    <div class="panel mt-2 space-y-3">
      <div id="totalsTable" class="text-sm"></div>
      <canvas id="lineChart" height="180"></canvas>
      <canvas id="barChart" height="180"></canvas>
    </div>
  </div>

  <!-- History / edit -->
  <div class="card rounded-xl p-3" id="historySection">
    <div class="flex justify-between items-center cursor-pointer" onclick="toggleCollapse('historySection')">
      <h2 class="font-semibold">Lịch sử các vòng</h2>
      <span class="chevron">▾</span>
    </div>
    <div class="panel mt-2 space-y-2" id="historyList"></div>
  </div>

  <button onclick="resetAll()" class="w-full bg-red-600 hover:bg-red-500 rounded-lg py-2 text-sm font-semibold mt-2">🗑 Reset toàn bộ</button>

</div>

<script>
const STORAGE_KEY = 'cardGameData';
let data = { players: [], rounds: [] };

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) data = JSON.parse(raw);
  if (!data.players) data.players = [];
  if (!data.rounds) data.rounds = [];
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function toggleCollapse(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ---- Setup section ----
function renderPlayerInputs() {
  const c = document.getElementById('playerInputs');
  c.innerHTML = '';
  const names = data.players.length ? data.players : [''];
  names.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'flex gap-2';
    row.innerHTML = `
      <input type="text" value="${name}" placeholder="Tên người chơi ${i+1}"
        class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm"
        oninput="data.players[${i}]=this.value">
      <button onclick="removePlayerInput(${i})" class="bg-slate-700 rounded-lg px-3 text-sm">✕</button>
    `;
    c.appendChild(row);
  });
}
function addPlayerInput() {
  data.players.push('');
  renderPlayerInputs();
}
function removePlayerInput(i) {
  data.players.splice(i,1);
  renderPlayerInputs();
}
function startGame() {
  data.players = data.players.map(p=>p.trim()).filter(p=>p.length);
  if (data.players.length < 2) { alert('Cần ít nhất 2 người chơi'); return; }
  save();
  renderPlayerInputs();
  renderRoundInputs();
  renderDashboard();
  renderHistory();
  document.getElementById('setupSection').classList.add('collapsed');
  document.getElementById('roundSection').classList.remove('collapsed');
}

// ---- Round input section ----
function renderRoundInputs(editIndex = null) {
  const c = document.getElementById('roundInputs');
  c.innerHTML = '';
  document.getElementById('roundNum').textContent = '#' + (editIndex !== null ? editIndex+1 : data.rounds.length+1);
  const existing = editIndex !== null ? data.rounds[editIndex] : null;

  data.players.forEach((name, i) => {
    const val = existing ? existing[name] : '';
    const row = document.createElement('div');
    row.className = 'flex items-center gap-2';
    row.innerHTML = `
      <span class="flex-1 text-sm truncate">${name}</span>
      <input type="number" min="0" placeholder="Số lá" value="${val}"
        class="w-20 bg-slate-900 border border-slate-600 rounded-lg px-2 py-1.5 text-sm text-center"
        data-player="${name}">
    `;
    c.appendChild(row);
  });

  const submitBtn = c.parentElement.querySelector('button');
  submitBtn.textContent = editIndex !== null ? 'Cập nhật vòng #' + (editIndex+1) : 'Lưu vòng này';
  submitBtn.onclick = () => submitRound(editIndex);
}

function submitRound(editIndex = null) {
  const inputs = document.querySelectorAll('#roundInputs input');
  const roundData = {};
  let valid = true;
  inputs.forEach(inp => {
    const v = inp.value.trim();
    if (v === '' || isNaN(v) || Number(v) < 0) valid = false;
    roundData[inp.dataset.player] = Number(v);
  });
  if (!valid) { alert('Vui lòng nhập số lá hợp lệ (>=0) cho tất cả người chơi'); return; }

  if (editIndex !== null) {
    data.rounds[editIndex] = roundData;
  } else {
    data.rounds.push(roundData);
  }
  save();
  renderRoundInputs();
  renderDashboard();
  renderHistory();
}

// ---- Dashboard ----
function getTotals() {
  const totals = {};
  data.players.forEach(p => totals[p] = 0);
  data.rounds.forEach(r => data.players.forEach(p => totals[p] += (r[p]||0)));
  return totals;
}

let lineChartObj = null, barChartObj = null;

function renderDashboard() {
  const totals = getTotals();
  const sorted = [...data.players].sort((a,b)=>totals[a]-totals[b]);

  const tbl = document.getElementById('totalsTable');
  if (!data.rounds.length) {
    tbl.innerHTML = '<p class="text-slate-400 text-center text-sm py-2">Chưa có dữ liệu</p>';
  } else {
    tbl.innerHTML = `
      <table class="w-full">
        <thead><tr class="text-slate-400 text-xs">
          <th class="text-left pb-1">Người chơi</th>
          <th class="text-right pb-1">Tổng lá</th>
          <th class="text-right pb-1">TB/vòng</th>
        </tr></thead>
        <tbody>
          ${sorted.map((p,idx) => `
            <tr class="border-t border-slate-700">
              <td class="py-1.5 ${idx===0 ? 'text-amber-400 font-semibold' : ''}">${idx===0?'👑 ':''}${p}</td>
              <td class="text-right py-1.5">${totals[p]}</td>
              <td class="text-right py-1.5 text-slate-400">${(totals[p]/data.rounds.length).toFixed(1)}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  // Line chart: cumulative totals per round
  const labels = data.rounds.map((_,i)=>'Vòng '+(i+1));
  const colors = ['#fbbf24','#34d399','#60a5fa','#f87171','#a78bfa','#fb923c','#22d3ee','#f472b6'];
  const lineDatasets = data.players.map((p,i)=>{
    let cum = 0;
    return {
      label: p,
      data: data.rounds.map(r => cum += (r[p]||0)),
      borderColor: colors[i%colors.length],
      backgroundColor: 'transparent',
      tension: 0.3
    };
  });

  if (lineChartObj) lineChartObj.destroy();
  lineChartObj = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: { labels, datasets: lineDatasets },
    options: {
      plugins: { title: { display:true, text:'Tổng lá lũy kế theo vòng', color:'#e2e8f0' },
                 legend: { labels: { color:'#cbd5e1', boxWidth:12, font:{size:10} } } },
      scales: { x:{ ticks:{color:'#94a3b8'} }, y:{ ticks:{color:'#94a3b8'}, beginAtZero:true } }
    }
  });

  // Bar chart: total per player
  if (barChartObj) barChartObj.destroy();
  barChartObj = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: data.players,
      datasets: [{ label:'Tổng lá', data: data.players.map(p=>totals[p]),
        backgroundColor: data.players.map((_,i)=>colors[i%colors.length]) }]
    },
    options: {
      plugins: { title:{ display:true, text:'Tổng lá hiện tại mỗi người', color:'#e2e8f0' }, legend:{ display:false } },
      scales: { x:{ ticks:{color:'#94a3b8'} }, y:{ ticks:{color:'#94a3b8'}, beginAtZero:true } }
    }
  });
}

// ---- History / Edit ----
function renderHistory() {
  const list = document.getElementById('historyList');
  if (!data.rounds.length) {
    list.innerHTML = '<p class="text-slate-400 text-center text-sm py-2">Chưa có vòng nào</p>';
    return;
  }
  list.innerHTML = data.rounds.map((r,i) => `
    <div class="bg-slate-900 rounded-lg p-2 flex justify-between items-center text-sm">
      <div>
        <span class="font-medium text-amber-400">Vòng ${i+1}:</span>
        ${data.players.map(p=>`${p}=${r[p]}`).join(', ')}
      </div>
      <div class="flex gap-1">
        <button onclick="editRound(${i})" class="bg-slate-700 hover:bg-slate-600 rounded px-2 py-1 text-xs">Sửa</button>
        <button onclick="deleteRound(${i})" class="bg-red-700 hover:bg-red-600 rounded px-2 py-1 text-xs">✕</button>
      </div>
    </div>
  `).join('');
}
function editRound(i) {
  document.getElementById('roundSection').classList.remove('collapsed');
  renderRoundInputs(i);
  document.getElementById('roundSection').scrollIntoView({behavior:'smooth'});
}
function deleteRound(i) {
  if (!confirm('Xóa vòng #' + (i+1) + '?')) return;
  data.rounds.splice(i,1);
  save();
  renderRoundInputs();
  renderDashboard();
  renderHistory();
}

// ---- Reset ----
function resetAll() {
  if (!confirm('Xóa toàn bộ dữ liệu (người chơi & các vòng)?')) return;
  data = { players: [], rounds: [] };
  save();
  renderPlayerInputs();
  document.getElementById('setupSection').classList.remove('collapsed');
  document.getElementById('roundSection').classList.add('collapsed');
  document.getElementById('roundInputs').innerHTML = '';
  document.getElementById('roundNum').textContent = '';
  renderDashboard();
  renderHistory();
}

// ---- Init ----
load();
renderPlayerInputs();
if (data.players.length) {
  renderRoundInputs();
  document.getElementById('setupSection').classList.add('collapsed');
} else {
  document.getElementById('roundSection').classList.add('collapsed');
}
renderDashboard();
renderHistory();
</script>
</body>
</html>
